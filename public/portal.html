<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game Portal</title>
    <style>
        /* Dark mode background for that classic proxy site feel */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1a1a2e;
            color: white;
            text-align: center;
            margin: 0;
            padding: 20px;
        }

        h1 {
            font-size: 3rem;
            margin-bottom: 40px;
            text-shadow: 2px 2px 5px rgba(0,0,0,0.5);
        }

        /* This creates the perfect grid for your game logos */
        .game-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            max-width: 1000px;
            margin: 0 auto;
            padding: 20px;
        }

        /* The design for each individual game button */
        .game-card {
            background-color: #16213e;
            border-radius: 15px;
            padding: 15px;
            text-decoration: none; /* Removes the ugly blue link underline */
            color: white;
            transition: transform 0.2s, box-shadow 0.2s;
            border: 2px solid #0f3460;
        }

        /* Makes the game pop up slightly when you hover over it */
        .game-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
            background-color: #1f305e;
        }

        /* The actual game logos */
        .game-logo {
            width: 100%;
            height: 150px;
            object-fit: cover; /* Keeps the image from stretching weirdly */
            border-radius: 10px;
            margin-bottom: 10px;
        }

        .game-title {
            font-size: 1.2rem;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <h1>🕹️ My Game Portal</h1>

    <div class="game-grid">
        
        <a href="/game.html" class="game-card">
            <img class="game-logo" src="https://images.unsplash.com/photo-1610961803738-9e583d7890b0?auto=format&fit=crop&w=300&q=80" alt="Coin Game">
            <div class="game-title">Gold Clicker</div>
        </a>

        <a href="#" class="game-card">
            <img class="game-logo" src="https://images.unsplash.com/photo-1611996575749-79a3a250f948?auto=format&fit=crop&w=300&q=80" alt="Tic Tac Toe">
            <div class="game-title">Tic-Tac-Toe</div>
        </a>

        <a href="#" class="game-card">
            <img class="game-logo" src="https://images.unsplash.com/photo-1534062013897-b248a39a738c?auto=format&fit=crop&w=300&q=80" alt="Snake">
            <div class="game-title">Snake</div>
        </a>

    </div>

</body>
</html>
