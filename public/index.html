<!DOCTYPE html>
<html lang="en">
<head>
    <title>My Web Proxy</title>
    <style>
        body { text-align: center; font-family: sans-serif; padding: 20px; }
        input { padding: 10px; width: 300px; }
        button { padding: 10px; cursor: pointer; }
        iframe { width: 100%; height: 70vh; margin-top: 20px; border: 2px solid black; }
    </style>
</head>
<body>
    <h1>Web Proxy</h1>
    <input type="text" id="urlInput" value="https://en.wikipedia.org">
    <button onclick="document.getElementById('proxyFrame').src = `/proxy?url=${encodeURIComponent(document.getElementById('urlInput').value)}`">Search</button>
    <iframe id="proxyFrame"></iframe>
</body>
</html>
